name: Backfill Form 4 Insider Trades (manual)

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Single year to backfill (e.g. 2022). Leave empty if using from_year."
        required: false
        default: ""
      from_year:
        description: "Backfill from this year through the current year (e.g. 2020). Ignored if year is set."
        required: false
        default: ""
      batch_size:
        description: "Max Form 4 filings to process per year"
        required: false
        default: "1000"

jobs:
  backfill-form4:
    name: "Backfill Form 4 insider trade history"
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: apps/pipeline

      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.year }}" ] && [ -z "${{ github.event.inputs.from_year }}" ]; then
            echo "Error: must provide either 'year' or 'from_year'"
            exit 1
          fi

      - name: Run Form 4 backfill
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="--year ${{ github.event.inputs.year }}"
          else
            ARGS="--from-year ${{ github.event.inputs.from_year }}"
          fi
          ARGS="$ARGS --batch-size ${{ github.event.inputs.batch_size }}"
          python backfill/backfill_form4.py $ARGS
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
