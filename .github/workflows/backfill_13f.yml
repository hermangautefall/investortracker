name: Backfill 13F Holdings (manual)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Max holdings to insert per run (re-run to continue)"
        required: false
        default: "200"
      start_cik:
        description: "CIK to start from (leave empty to resume from saved state)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — print what would be inserted without writing to DB"
        type: boolean
        required: false
        default: false

jobs:
  backfill-13f:
    name: "Backfill superinvestor 13F history"
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: apps/pipeline

      - name: Run 13F backfill
        run: |
          ARGS="--batch-size ${{ github.event.inputs.batch_size }}"
          if [ -n "${{ github.event.inputs.start_cik }}" ]; then
            ARGS="$ARGS --start-cik ${{ github.event.inputs.start_cik }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python backfill/backfill_13f.py $ARGS
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
