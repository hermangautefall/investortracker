name: Daily Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 10:00 Norwegian summer time
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  fetch-congress:
    name: "1. Congressional trades"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: apps/pipeline
      - run: python jobs/fetch_congress.py
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  fetch-form4:
    name: "2. Form 4 insider trades"
    runs-on: ubuntu-latest
    needs: fetch-congress
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: apps/pipeline
      - run: python jobs/fetch_form4.py
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  enrich-prices:
    name: "3. Stock prices (batch)"
    runs-on: ubuntu-latest
    needs: fetch-form4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: apps/pipeline
      - run: python jobs/enrich_prices.py
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

  refresh-aggregates:
    name: "4. Refresh materialized views"
    runs-on: ubuntu-latest
    needs: enrich-prices
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: apps/pipeline
      - run: python jobs/refresh_aggregates.py
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  fetch-superinvestors:
    name: "5. Superinvestor 13F holdings"
    runs-on: ubuntu-latest
    needs: refresh-aggregates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: apps/pipeline
      - run: python jobs/fetch_13f.py
        working-directory: apps/pipeline
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
